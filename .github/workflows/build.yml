name: Build CursorOverlay x86

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW32
        update: true
        install: mingw-w64-i686-gcc

    - name: Build x86
      shell: msys2 {0}
      run: |
        g++ main.cpp -o CursorOverlay.exe -mwindows -static -static-libgcc -static-libstdc++ -lgdi32 -luser32

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: CursorOverlay-x86
        path: CursorOverlay.exe
